{% extends 'base.html' %}

{% block title %}{% if transport %}Редактирование{% else %}Создание{% endif %} транспорта{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <!-- Заголовок -->
            <h2 class="text-center mb-5">
                {% if transport %}Редактирование транспорта{% else %}Создание транспорта{% endif %}
            </h2>

            <!-- Форма -->
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="row g-3">
                    <!-- Марка -->
                    <div class="col-md-6">
                        <label for="id_brand" class="form-label">Марка</label>
                        <input type="text" class="form-control form-control-lg rounded-pill border-info" 
                               id="id_brand" name="brand" value="{{ transport.brand|default:'' }}" required>
                    </div>

                    <!-- Модель -->
                    <div class="col-md-6">
                        <label for="id_model" class="form-label">Модель</label>
                        <input type="text" class="form-control form-control-lg rounded-pill border-info" 
                               id="id_model" name="model" value="{{ transport.model|default:'' }}" required>
                    </div>

                    <!-- Тип ТС (Выпадающий список) -->
                    <div class="col-md-6">
                        <label for="id_transport_type" class="form-label">Тип ТС</label>
                        <select class="form-select form-select-lg rounded-pill border-info" 
                                id="id_transport_type" name="transport_type" required>
                            <option value="" selected disabled>Тип не выбран</option>
                            {% for type in transport_types %}
                                <option value="{{ type.id }}" {% if transport.transport_type.id == type.id %}selected{% endif %}>
                                    {{ type.name }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="form-text">
                            <a href="{% url 'admin_type_create' %}" class="link-info">Добавить тип ТС</a>
                        </div>
                    </div>

                    <!-- Номер ТС -->
                    <div class="col-md-6">
                        <label for="id_transport_number" class="form-label">Номер ТС</label>
                        <input type="text" class="form-control form-control-lg rounded-pill border-info" 
                               id="id_transport_number" name="transport_number" value="{{ transport.transport_number|default:'' }}" required>
                    </div>

                    <!-- Вместимость -->
                    <div class="col-md-6">
                        <label for="id_capacity" class="form-label">Вместимость</label>
                        <input type="number" step="0.01" class="form-control form-control-lg rounded-pill border-info" 
                               id="id_capacity" name="capacity" value="{{ transport.capacity|default:'' }}" required>
                    </div>
                </div>

                <!-- Кнопка отправки -->
                <div class="d-grid gap-2 mt-5">
                    <button type="submit" class="btn btn-info btn-lg rounded-pill py-3 fw-bold">
                        {% if transport %}Сохранить изменения{% else %}Добавить транспорт{% endif %}
                    </button>
                </div>
                
                <!-- Кнопка отмены -->
                <div class="text-center mt-3">
                    <a href="{% url 'admin_transport_list' %}" class="text-decoration-none text-muted">Отмена</a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
