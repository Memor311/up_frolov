{% extends 'base.html' %}
{% block title %}Роли - Админ панель{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-3 col-lg-2 p-0">{% include 'admin/sidebar.html' %}</div>
        <div class="col-md-9 col-lg-10 p-4 bg-white">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Роли</h2>
                <a href="{% url 'admin_role_create' %}" class="btn btn-success rounded-pill px-4">Добавить роль</a>
            </div>
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width:50px;">№</th>
                                <th>Название роли</th>
                                <th style="width:200px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for r in roles %}
                            <tr>
                                <td>{{ r.id }}</td>
                                <td>{{ r.name }}</td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <a href="{% url 'admin_role_delete' r.id %}" class="btn btn-danger btn-sm rounded-pill flex-fill" onclick="return confirm('Вы уверены?');">Удалить</a>
                                        <a href="{% url 'admin_role_edit' r.id %}" class="btn btn-warning btn-sm rounded-pill flex-fill">Редактировать</a>
                                    </div>
                                </td>
                            </tr>
                            {% empty %}
                            <tr><td colspan="3" class="text-center py-4">Список пуст</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
