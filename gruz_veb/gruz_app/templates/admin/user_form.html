{% extends 'base.html' %}
{% block title %}{% if user %}Редактирование{% else %}Создание{% endif %} пользователя{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2 class="text-center mb-5">{% if user %}Редактирование{% else %}Создание{% endif %} пользователя</h2>
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Фамилия</label>
                        <input type="text" name="surname" class="form-control form-control-lg rounded-pill border-info" value="{{ user.surname|default:'' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Имя</label>
                        <input type="text" name="first_name" class="form-control form-control-lg rounded-pill border-info" value="{{ user.first_name|default:'' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Отчество</label>
                        <input type="text" name="patronymic" class="form-control form-control-lg rounded-pill border-info" value="{{ user.patronymic|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control form-control-lg rounded-pill border-info" value="{{ user.phone|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Роль</label>
                        <select name="role" class="form-select form-select-lg rounded-pill border-info" required>
                            <option value="" disabled {% if not user %}selected{% endif %}>Выберите роль</option>
                            {% for r in roles %}
                                <option value="{{ r.id }}" {% if user.role.id == r.id %}selected{% endif %}>{{ r.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">
                            <a href="{% url 'admin_type_create' %}" class="link-info">Добавить роль</a>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Адрес</label>
                        <textarea name="address" class="form-control form-control-lg rounded-4 border-info" rows="3" required>{{ user.address|default:'' }}</textarea>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-5">
                    <button type="submit" class="btn btn-info btn-lg rounded-pill py-3 fw-bold">{% if user %}Сохранить{% else %}Добавить{% endif %}</button>
                </div>
                <div class="text-center mt-3"><a href="{% url 'admin_user_list' %}" class="text-muted">Отмена</a></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
