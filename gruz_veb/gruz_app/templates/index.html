{% extends 'base.html' %}

{% block title %}Главная - Логистическая система{% endblock %}

{% block content %}
<div class="container py-5">
    
    <!-- Центральный блок с инструкцией -->
    <div class="row justify-content-center mb-5">
        <div class="col-lg-10">
            <div class="card border-0 shadow bg-primary text-white rounded-4">
                <div class="card-body p-5 text-center">
                    <h4 class="card-title">Добро пожаловать в систему. Используйте меню ниже для навигации по основным разделам.</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Три карточки действий -->
    <div class="row g-4 justify-content-center">
        
        <!-- Карточка 1 -->
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm text-center rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3 text-primary fw-bold">Перейти в справочники</h5>
                    <a href="{% url 'admin_transport_list' %}" class="btn btn-primary rounded-pill px-4">Перейти</a>
                </div>
            </div>
        </div>

        <!-- Карточка 2 -->
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm text-center rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3 text-primary fw-bold">Создать маршрут</h5>
                    <a href="#" class="btn btn-primary rounded-pill px-4">Перейти</a>
                </div>
            </div>
        </div>

        <!-- Карточка 3 -->
        <div class="col-md-4">
            <div class="card h-100 border-0 shadow-sm text-center rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3 text-primary fw-bold">Просмотреть все маршруты</h5>
                    <a href="#" class="btn btn-primary rounded-pill px-4">Перейти</a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
