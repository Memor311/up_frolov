<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Логистическая система{% endblock %}</title>
    <!-- Подключение Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- ШАПКА -->
    <nav class="navbar navbar-expand-lg bg-primary text-white shadow-sm">
        <div class="container">
            <a class="navbar-brand bg-white text-primary fw-bold rounded-pill px-3 py-2" href="/">
                Лого
            </a>
            
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'admin_transport_list' %}">Справочники</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Маршруты</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="flex-shrink-0 w-100">
        {% block content %}{% endblock %}
    </main>

    <!-- ПОДВАЛ -->
    <footer class="bg-dark text-light text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">Подвал</p>
        </div>
    </footer>

    <!-- Подключение Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
