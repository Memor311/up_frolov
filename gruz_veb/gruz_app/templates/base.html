<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Логистическая система{% endblock %}</title>
    <!-- Подключение Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- ШАПКА -->
    <nav class="navbar navbar-expand-lg bg-primary text-white shadow-sm">
        <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
        <!-- Ссылка на справочники (ведет в админку) -->
        <li class="nav-item dropdown">
            <a class="nav-link text-white dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                Справочники
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'admin_transport_list' %}">Транспорты</a></li>
                <li><a class="dropdown-item" href="{% url 'admin_type_list' %}">Типы ТС</a></li>
                <li><a class="dropdown-item" href="{% url 'admin_user_list' %}">Пользователи</a></li>
                <li><a class="dropdown-item" href="{% url 'admin_role_list' %}">Роли</a></li>
                <li><a class="dropdown-item" href="{% url 'admin_cargo_list' %}">Грузы</a></li>
            </ul>
        </li>
        
        <!-- Ссылка на Маршруты (теперь отдельно) -->
        <li class="nav-item">
            <a class="nav-link text-white fw-bold" href="{% url 'route_list' %}">Маршруты</a>
        </li>
    </ul>
</div>
    </nav>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="flex-shrink-0 w-100">
        {% block content %}{% endblock %}
    </main>

    <!-- ПОДВАЛ -->
    <footer class="bg-dark text-light text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">Подвал</p>
        </div>
    </footer>

    <!-- Подключение Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
