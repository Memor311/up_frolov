{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center">
    <div class="card border-danger mx-auto" style="max-width:500px;">
        <div class="card-header bg-danger text-white">Удаление маршрута</div>
        <div class="card-body">
            <p>Вы уверены, что хотите удалить маршрут #{{ route.id }}?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'route_detail' route.id %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
